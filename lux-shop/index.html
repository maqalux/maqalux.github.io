<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Maqalux | Exclusive Collection</title>
    <!-- Snipcart (Ödəniş infrastrukturu) -->
    <link rel="stylesheet" href="https://cdn.snipcart.com/themes/v3.0.31/default/snipcart.css" />
    <script async src="https://cdn.snipcart.com/themes/v3.0.31/default/snipcart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- Navbar -->
    <nav class="lux-nav">
        <div class="logo">MAQALUX</div>
        <div class="nav-actions">
            <span class="cart-counter" id="cartCount">0</span>
            <button class="snipcart-checkout">🛒</button>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Time is the ultimate luxury.</h1>
        <p>2026 Pre-Spring Collection</p>
        <a href="#shop" class="cta-btn">Explore</a>
    </section>

    <!-- Məhsul Grid -->
    <section id="shop" class="product-grid">
        <h2>Curated Selection</h2>
        <div class="grid-container" id="productContainer">
            <!-- JS ilə products.json-dan yüklənəcək -->
        </div>
    </section>

    <!-- Snipcart gizli məlumatlar (public key) -->
    <div hidden id="snipcart" data-api-key="YOUR_SNIPCART_PUBLIC_KEY"></div>
    <script src="script.js"></script>
</body>
</html>
