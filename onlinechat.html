<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maqalux - Onlayn Çat</title>
  <link rel="icon" href="logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body { margin: 0; font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #1e002f, #0055a5); color: white; min-height: 100vh; display: flex; flex-direction: column; }
    header { display: flex; align-items: center; justify-content: space-between; flex-wrap: nowrap; height: 90px; padding: 0 30px; box-sizing: border-box; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.2); position: sticky; top: 0; z-index: 1000; box-shadow: 0 5px 30px rgba(0,0,0,0.3); }
    header a.logo { display: flex; align-items: center; gap: 10px; height: 100%; text-decoration: none; }
    header a.logo img { height: 55px; width: auto; object-fit: contain; display: block; margin: auto 0; transition: transform 0.4s ease; }
    header a.logo img:hover { transform: scale(1.1) rotate(-3deg); }
    
    nav ul { list-style: none; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin: 0; padding: 0; }
    nav ul li a { text-decoration: none; color: white; font-weight: 600; font-size: 16px; padding: 10px 18px; line-height: 1; border-radius: 30px; position: relative; overflow: hidden; transition: all 0.3s ease; }
    nav ul li a::before { content: ''; position: absolute; top: 0; left: 0; width: 0%; height: 100%; background: linear-gradient(90deg, #FFD700, #FF8C00); transition: width 0.4s ease; z-index: -1; border-radius: 30px; }
    nav ul li a:hover::before { width: 100%; }
    nav ul li a:hover { color: black; transform: translateY(-2px); }
    nav ul li a.active { background: linear-gradient(90deg, #FFD700, #FF8C00); color: black; box-shadow: 0 0 20px rgba(255,215,0,0.6); }

    main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .chat-container { width: 100%; max-width: 800px; height: 650px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 40px rgba(0,0,0,0.4); display: flex; flex-direction: column; overflow: hidden; animation: fadeIn 1s ease; position: relative; }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .chat-screen { display: none !important; flex-direction: column; height: 100%; width: 100%; }
    .chat-screen.active { display: flex !important; }

    #loginScreen { justify-content: center; align-items: center; text-align: center; background: rgba(0, 0, 0, 0.2); }
    #loginScreen h2 { font-size: 2.2em; background: linear-gradient(90deg, #FFD700, #FFA500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
    .input-group { display: flex; flex-direction: column; gap: 15px; width: 80%; max-width: 320px; }
    .custom-input { padding: 15px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; font-size: 16px; outline: none; transition: 0.3s; font-family: 'Poppins', sans-serif; text-align: center; }
    .custom-input::placeholder { color: rgba(255,255,255,0.6); }
    .custom-input:focus { border-color: #FFD700; background: rgba(255,255,255,0.2); box-shadow: 0 0 15px rgba(255,215,0,0.3); }
    .login-btn { background: linear-gradient(90deg, #FFD700, #FF8C00); color: black; border: none; padding: 15px; border-radius: 30px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; font-family: 'Poppins', sans-serif; }
    .login-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 20px rgba(255,215,0,0.5); }

    .chat-header { background: rgba(0, 0, 0, 0.3); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .chat-header h3 { margin: 0; font-size: 1.2em; color: #FFD700; display: flex; align-items: center; gap: 10px; }
    .logout-btn { background: rgba(255, 0, 0, 0.6); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: 600; font-family: 'Poppins', sans-serif; transition: 0.3s; }
    .logout-btn:hover { background: rgba(255, 0, 0, 0.9); }

    .messages-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
    .messages-area::-webkit-scrollbar { width: 8px; }
    .messages-area::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.5); border-radius: 10px; }
    
    .msg-bubble { max-width: 75%; padding: 12px 18px; border-radius: 20px; font-size: 15px; line-height: 1.4; position: relative; word-wrap: break-word; }
    .msg-bubble b { display: block; font-size: 0.85em; margin-bottom: 5px; opacity: 0.8; }
    
    .msg-me { background: linear-gradient(135deg, #FFD700, #FF8C00); color: black; align-self: flex-end; border-bottom-right-radius: 5px; }
    .msg-other { background: rgba(255, 255, 255, 0.15); color: white; align-self: flex-start; border-bottom-left-radius: 5px; border: 1px solid rgba(255,255,255,0.1); }

    .input-bar { padding: 15px 20px; background: rgba(0, 0, 0, 0.3); border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 10px; align-items: center; }
    .message-input { flex: 1; padding: 12px 20px; border-radius: 30px; border: none; background: rgba(255,255,255,0.1); color: white; font-size: 15px; outline: none; font-family: 'Poppins', sans-serif; }
    .message-input::placeholder { color: rgba(255,255,255,0.5); }
    .message-input:focus { background: rgba(255,255,255,0.2); }
    .send-btn { background: #FFD700; color: black; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 20px; transition: 0.3s; }
    .send-btn:hover { transform: scale(1.1); background: #FF8C00; }

    footer { text-align: center; padding: 20px; color: #FFD700; font-weight: 600; border-top: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
    footer:hover { background: rgba(255,255,255,0.15); color: #fff; transition: 0.4s; }

    @media (max-width: 700px) {
      header { height: auto; flex-direction: column; gap: 10px; padding: 15px 20px; }
      .chat-container { height: 80vh; }
      .msg-bubble { max-width: 85%; }
    }
  </style>
</head>

<body>
  <header>
    <a href="index.html" class="logo">
      <img src="https://maqalux.github.io/Picsart_25-10-28_10-01-29-931.png" alt="Maqalux loqosu">
    </a>
    <nav>
      <ul>
        <li><a href="index.html">Ana səhifə</a></li>
        <li><a href="xeberler.html">Xəbərlər</a></li>
        <li><a href="proqramlar.html">Proqramlar</a></li>
        <li><a href="şahmat.html">Şahmat</a></li>
        <li><a href="eylence.html">Əyləncə</a></li>
        <li><a href="onlinechat.html" class="active">Onlayn çat</a></li>
        <li><a href="haqqimizda.html">Haqqımızda</a></li>
        <li><a href="elaqe.html">Əlaqə</a></li>
      </ul> 
    </nav>
  </header>

  <main>
    <div class="chat-container">
      
      <div class="chat-screen active" id="loginScreen">
        <h2>Maqalux Çat</h2>
        <div class="input-group">
          <input type="text" id="nicknameInput" class="custom-input" placeholder="Ləqəbiniz">
          <input type="password" id="passwordInput" class="custom-input" placeholder="Şifrəniz">
          <button class="login-btn" onclick="loginOrRegister()">Söhbətə Qoşul</button>
        </div>
      </div>

      <div class="chat-screen" id="mainChatScreen">
        <div class="chat-header">
          <h3 id="myDisplayNick">🟢 İstifadəçi</h3>
          <button class="logout-btn" onclick="location.reload()">Çıxış</button>
        </div>
        
        <div class="messages-area" id="chatMessagesArea"></div>
        
       <div class="input-bar">
  <input type="text" id="recipientInput" class="message-input" placeholder="Kimə (Hamıya)" style="flex: 0.4; max-width: 150px; border-right: 2px solid rgba(255,215,0,0.5);">
  
  <input type="text" id="messageInputField" class="message-input" placeholder="Mesajınızı bura yazın..." onkeypress="handleKeyPress(event)">
  <button class="send-btn" onclick="triggerMessageSend()">➤</button>
</div>

    </div>
  </main>

  <footer>
    &copy; 2025 Maqalux - Bütün hüquqlar qorunur.
  </footer>

  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  
  <script>
    // === LINKI BURADA DƏYİŞİN (Sonunda / işarəsi olmasın!) ===
    const RENDER_URL = "https://maqalux.onrender.com"; 
    
    // Serverə təhlükəsiz bağlantı qurulur
    const socket = io(RENDER_URL, { transports: ['websocket', 'polling'] }); 
    
    window.currentUserNick = "";
    window.allMessages = []; // Bütün mesajları burada saxlayacağıq
    window.renderMessages = function() {
  document.getElementById('chatMessagesArea').innerHTML = ''; // Ekranı təmizlə
  window.allMessages.forEach(msg => appendMessage(msg)); // Yenidən yazdır
};

    window.loginOrRegister = function() {
      const nick = document.getElementById('nicknameInput').value.trim();
      const pass = document.getElementById('passwordInput').value.trim();
      if(!nick || !pass) return alert("Zəhmət olmasa ləqəb və şifrəni daxil edin.");

      // Əgər hələ serverə tam qoşulmayıbsa xəbərdarlıq etsin
      if(!socket.connected) {
        return alert("Serverə qoşulma qurulur, zəhmət olmasa 3-5 saniyə sonra yenidən cəhd edin.");
      }

      socket.emit('login', { nick, pass }, (response) => {
        if (response.success) {
          window.currentUserNick = nick;
          document.getElementById('myDisplayNick').innerHTML = `🟢 ${nick}`;
          window.renderMessages();
          document.getElementById('loginScreen').classList.remove('active');
          document.getElementById('mainChatScreen').classList.add('active');
        } else {
          alert(response.message);
        }
      });
    };

   window.triggerMessageSend = () => {
  const input = document.getElementById('messageInputField');
  const recipient = document.getElementById('recipientInput').value.trim(); // Yeni əlavə
  const text = input.value.trim();

  if(!text) return;

  if (recipient === "") {
    // Qutu boşdursa, HAMİYA göndər
    socket.emit('sendMessage', { sender: window.currentUserNick, text: text });
  } else {
    // Qutuda ad varsa, ŞƏXSİ göndər
    socket.emit('sendPrivateMessage', { sender: window.currentUserNick, recipient: recipient, text: text });
    
    // Öz yazdığımızı öz ekranımızda xüsusi rənglə görək deyə yaddaşa atırıq
    const privateMsg = { sender: window.currentUserNick, text: `🔒 [Şəxsi - ${recipient} üçün]: ${text}` };
    window.allMessages.push(privateMsg);
    appendMessage(privateMsg);
  }
  input.value = "";
};
      
      socket.emit('sendMessage', { sender: window.currentUserNick, text: input.value });
      input.value = "";
    };

    window.handleKeyPress = (e) => {
      if(e.key === 'Enter') triggerMessageSend();
    };

    function appendMessage(msg) {
      const div = document.createElement('div');
      div.className = 'msg-bubble ' + (msg.sender === window.currentUserNick ? 'msg-me' : 'msg-other');
      div.innerHTML = `<b>${msg.sender}</b> ${msg.text}`;
      
      const area = document.getElementById('chatMessagesArea');
      area.appendChild(div);
      area.scrollTop = area.scrollHeight; 
    }

    socket.on('loadAllMessages', (messages) => {
     window.allMessages = messages; // Gələn mesajları yaddaşa at
  renderMessages(); // Ekrana çək
});

   socket.on('receiveMessage', (msg) => {
  window.allMessages.push(msg); // Yeni mesajı yaddaş siyahısına əlavə et
  appendMessage(msg);
});

    socket.on('receivePrivateMessage', (msg) => {
  // Gələn mesajın mətninə şəxsi olduğunu bildirən işarə qoyuruq
  msg.text = `🔒 [Sənə Şəxsi]: ${msg.text}`;
  window.allMessages.push(msg);
  appendMessage(msg);
});

    // Əlaqə xətalarını konsolda görmək üçün
    socket.on('connect_error', (error) => {
      console.error("Bağlantı xətası:", error);
    });
  </script>
</body>
</html>
