<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maqalux - Modern Çat</title>
  <link rel="icon" href="logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body { margin: 0; font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #1e002f, #0055a5); color: white; min-height: 100vh; display: flex; flex-direction: column; }
    header { display: flex; align-items: center; justify-content: space-between; height: 90px; padding: 0 30px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.2); position: sticky; top: 0; z-index: 1000; box-shadow: 0 5px 30px rgba(0,0,0,0.3); }
    header a.logo img { height: 55px; transition: transform 0.4s ease; }
    header a.logo img:hover { transform: scale(1.1) rotate(-3deg); }
    
    nav ul { list-style: none; display: flex; gap: 10px; margin: 0; padding: 0; }
    nav ul li a { text-decoration: none; color: white; font-weight: 600; font-size: 16px; padding: 10px 18px; border-radius: 30px; position: relative; transition: all 0.3s ease; }
    nav ul li a.active { background: linear-gradient(90deg, #FFD700, #FF8C00); color: black; box-shadow: 0 0 20px rgba(255,215,0,0.6); }

    main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .chat-container { width: 100%; max-width: 1000px; height: 650px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 40px rgba(0,0,0,0.4); display: flex; flex-direction: column; overflow: hidden; }
    
    .chat-screen { display: none !important; height: 100%; width: 100%; }
    .chat-screen.active { display: flex !important; flex-direction: column; }

    #loginScreen { justify-content: center; align-items: center; text-align: center; background: rgba(0, 0, 0, 0.2); }
    #loginScreen h2 { font-size: 2.2em; background: linear-gradient(90deg, #FFD700, #FFA500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
    .input-group { display: flex; flex-direction: column; gap: 15px; width: 80%; max-width: 320px; }
    .custom-input { padding: 15px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; font-size: 16px; outline: none; text-align: center; }
    .custom-input:focus { border-color: #FFD700; box-shadow: 0 0 15px rgba(255,215,0,0.3); }
    .login-btn { background: linear-gradient(90deg, #FFD700, #FF8C00); color: black; border: none; padding: 15px; border-radius: 30px; font-weight: 700; cursor: pointer; transition: 0.3s; }
    .login-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 20px rgba(255,215,0,0.5); }

    .chat-header { background: rgba(0, 0, 0, 0.3); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .chat-header h3 { margin: 0; color: #FFD700; }
    .logout-btn { background: rgba(255, 0, 0, 0.6); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: 600; }

    /* Modern İki Sütunlu Struktur */
    .chat-body { flex: 1; display: flex; overflow: hidden; }
    .messages-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
    .messages-area::-webkit-scrollbar { width: 6px; }
    .messages-area::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.4); border-radius: 10px; }
    
    .sidebar-users { width: 220px; background: rgba(0, 0, 0, 0.2); border-left: 1px solid rgba(255,255,255,0.1); padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    .sidebar-users h4 { margin: 0 0 10px 0; color: #FFD700; border-bottom: 1px solid rgba(255,215,0,0.3); padding-bottom: 5px; }
    .user-badge { background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 15px; font-size: 14px; display: flex; align-items: center; gap: 8px; }
    .user-badge::before { content: "🟢"; font-size: 10px; }

    .msg-bubble { max-width: 75%; padding: 12px 18px; border-radius: 20px; font-size: 15px; position: relative; word-wrap: break-word; display: flex; flex-direction: column; }
    .msg-bubble b { font-size: 0.85em; margin-bottom: 5px; opacity: 0.8; }
    .msg-bubble img { max-width: 100%; max-height: 200px; border-radius: 10px; margin-top: 5px; object-fit: cover; }
    
    .msg-me { background: linear-gradient(135deg, #FFD700, #FF8C00); color: black; align-self: flex-end; border-bottom-right-radius: 5px; }
    .msg-other { background: rgba(255, 255, 255, 0.15); color: white; align-self: flex-start; border-bottom-left-radius: 5px; }
    
    .delete-btn { background: none; border: none; color: rgba(255,0,0,0.7); cursor: pointer; font-size: 12px; align-self: flex-end; margin-top: 5px; padding: 0; }
    .delete-btn:hover { color: red; text-decoration: underline; }

    .input-bar { padding: 15px 20px; background: rgba(0, 0, 0, 0.3); border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 10px; align-items: center; }
    .message-input { padding: 12px 20px; border-radius: 30px; border: none; background: rgba(255,255,255,0.1); color: white; font-size: 15px; outline: none; }
    .message-input::placeholder { color: rgba(255,255,255,0.5); }
    
    .media-label { background: rgba(255,255,255,0.2); width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 20px; transition: 0.3s; }
    .media-label:hover { background: rgba(255,255,255,0.4); }
    .send-btn { background: #FFD700; color: black; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 20px; }
    .send-btn:hover { background: #FF8C00; transform: scale(1.05); }

    footer { text-align: center; padding: 20px; color: #FFD700; font-weight: 600; border-top: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); }

    @media (max-width: 700px) {
      header { height: auto; flex-direction: column; padding: 15px; }
      .chat-body { flex-direction: column; }
      .sidebar-users { width: 100%; height: 100px; border-left: none; border-bottom: 1px solid rgba(255,255,255,0.1); }
    }
  </style>
</head>

<body>
  <header>
    <a href="index.html" class="logo">
      <img src="https://maqalux.github.io/Picsart_25-10-28_10-01-29-931.png" alt="Maqalux loqosu">
    </a>
    <nav>
      <ul>
        <li><a href="index.html">Ana səhifə</a></li>
        <li><a href="onlinechat.html" class="active">Onlayn çat</a></li>
      </ul> 
    </nav>
  </header>

  <main>
    <div class="chat-container">
      
      <div class="chat-screen active" id="loginScreen">
        <h2>Maqalux Çat Platforması</h2>
        <div class="input-group">
          <input type="text" id="nicknameInput" class="custom-input" placeholder="Ləqəbiniz">
          <input type="password" id="passwordInput" class="custom-input" placeholder="Şifrəniz">
          <button class="login-btn" onclick="loginOrRegister()">Söhbətə Qoşul / Qeydiyyat</button>
        </div>
      </div>

      <div class="chat-screen" id="mainChatScreen">
        <div class="chat-header">
          <h3 id="myDisplayNick">🟢 İstifadəçi</h3>
          <button class="logout-btn" onclick="location.reload()">Çıxış</button>
        </div>
        
        <div class="chat-body">
          <div class="messages-area" id="chatMessagesArea"></div>
          
          <div class="sidebar-users">
            <h4>Aktiv Kəslər</h4>
            <div id="activeUsersList"></div>
          </div>
        </div>
        
        <div class="input-bar">
          <input type="text" id="recipientInput" class="message-input" placeholder="Kimə (Hamıya)" style="flex: 0.3; max-width: 120px;">
          <input type="text" id="messageInputField" class="message-input" placeholder="Mesajınızı bura yazın..." style="flex: 1;" onkeypress="handleKeyPress(event)">
          
          <label class="media-label" title="Şəkil və ya GIF göndər">
            🖼️
            <input type="file" id="mediaFileInput" accept="image/*" style="display: none;" onchange="handleMediaUpload(event)">
          </label>
          
          <button class="send-btn" onclick="triggerMessageSend()">➤</button>
        </div>
      </div>

    </div>
  </main>

  <footer>
    &copy; 2026 Maqalux - Bütün hüquqlar qorunur.
  </footer>

  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script>
    const RENDER_URL = "https://maqalux.onrender.com"; 
    const socket = io(RENDER_URL, { transports: ['websocket', 'polling'] }); 
    
    window.currentUserNick = "";
    window.currentUserRole = "user";
    window.allMessages = []; 

    window.renderMessages = function() {
      document.getElementById('chatMessagesArea').innerHTML = '';
      window.allMessages.forEach(msg => appendMessage(msg));
    };

    window.loginOrRegister = function() {
      const nick = document.getElementById('nicknameInput').value.trim();
      const pass = document.getElementById('passwordInput').value.trim();
      if(!nick || !pass) return alert("Zəhmət olmasa ləqəb və şifrəni daxil edin.");

      if(!socket.connected) {
        return alert("Serverə qoşulma qurulur, bir az sonra yenidən cəhd edin.");
      }

      socket.emit('login', { nick, pass }, (response) => {
        if (response.success) {
          window.currentUserNick = nick;
          window.currentUserRole = response.role || "user";
          document.getElementById('myDisplayNick').innerHTML = `🟢 ${nick} (${window.currentUserRole})`;
          window.renderMessages();
          document.getElementById('loginScreen').classList.remove('active');
          document.getElementById('mainChatScreen').classList.add('active');
        } else {
          alert(response.message);
        }
      });
    };

    // Mesaj Göndərmə Məntiqi
    window.triggerMessageSend = (mediaData = null) => {
      const input = document.getElementById('messageInputField');
      const recipient = document.getElementById('recipientInput').value.trim();
      const text = input.value.trim();

      if(!text && !mediaData) return;

      const payload = {
        sender: window.currentUserNick,
        text: text,
        mediaType: mediaData ? "image" : "text",
        mediaUrl: mediaData ? mediaData : ""
      };

      if (recipient === "") {
        socket.emit('sendMessage', payload);
      } else {
        payload.recipient = recipient;
        socket.emit('sendPrivateMessage', payload);
        
        // Şəxsi mesajı öz ekranımızda göstərmək
        const privateMsg = { 
          sender: window.currentUserNick, 
          text: `🔒 [Şəxsi - ${recipient} üçün]: ${text}`,
          mediaType: payload.mediaType,
          mediaUrl: payload.mediaUrl
        };
        window.allMessages.push(privateMsg);
        appendMessage(privateMsg);
      }
      input.value = "";
    };

    // Şəkil / GIF Mexanizmi (Base64 formatına çevirir)
    window.handleMediaUpload = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = function(event) {
        window.triggerMessageSend(event.target.result);
      };
      reader.readAsDataURL(file);
      e.target.value = ""; // İnputu sıfırla
    };

    window.handleKeyPress = (e) => {
      if(e.key === 'Enter') triggerMessageSend();
    };

    // Admin Silmə Əmri
    window.requestDelete = (msgId) => {
      if(confirm("Bu mesajı silmək istədiyinizdən əminsiniz?")) {
        socket.emit('deleteMessage', msgId);
      }
    };

    function appendMessage(msg) {
      if (!msg) return;
      const div = document.createElement('div');
      div.className = 'msg-bubble ' + (msg.sender === window.currentUserNick ? 'msg-me' : 'msg-other');
      
      let content = `<b>${msg.sender}</b> ${msg.text}`;
      
      // Əgər mesajda şəkil və ya GIF varsa ekrana bas
      if(msg.mediaType === 'image' && msg.mediaUrl) {
        content += `<br><img src="${msg.mediaUrl}" alt="Media">`;
      }

      // Əgər loqin olan şəxs admindirə və mesaj ümumidirsə və hələ silinməyibsə Sil düyməsi qoy
      if(window.currentUserRole === 'admin' && msg.id && !msg.isDeleted) {
        content += `<button class="delete-btn" onclick="requestDelete('${msg.id}')">🗑️ Sil</button>`;
      }

      div.innerHTML = content;
      const area = document.getElementById('chatMessagesArea');
      area.appendChild(div);
      area.scrollTop = area.scrollHeight; 
    }

    // Dynamic Sockets Listeners
    socket.on('loadAllMessages', (messages) => {
      window.allMessages = messages;
      renderMessages();
    });

    socket.on('receiveMessage', (msg) => {
      window.allMessages.push(msg);
      appendMessage(msg);
    });

    socket.on('receivePrivateMessage', (msg) => {
      let secureMsg = { ...msg };
      if (msg.sender !== 'Sistem') {
        secureMsg.text = `🔒 [Sənə Şəxsi]: ${msg.text}`;
      }
      window.allMessages.push(secureMsg);
      appendMessage(secureMsg);
    });

    socket.on('loadPrivateMessages', (messages) => {
      messages.forEach(msg => {
        let formattedMsg = { id: msg.id, sender: msg.sender, mediaType: msg.mediaType, mediaUrl: msg.mediaUrl };
        if (msg.sender === window.currentUserNick) {
          formattedMsg.text = `🔒 [Şəxsi - ${msg.recipient} üçün]: ${msg.text}`;
        } else {
          formattedMsg.text = `🔒 [Sənə Şəxsi]: ${msg.text}`;
        }
        window.allMessages.push(formattedMsg);
      });
      renderMessages();
    });

    // Real-time silinmə əmri gələndə mesajı ekranda yenilə
    socket.on('messageUpdated', (updatedMsg) => {
      const index = window.allMessages.findIndex(m => m.id === updatedMsg.id);
      if(index !== -1) {
        window.allMessages[index] = updatedMsg;
        renderMessages();
      }
    });

    // Aktiv Onlayn İstifadəçilər Siyahısını Yeniləyir
    socket.on('updateActiveUsers', (usersList) => {
      const container = document.getElementById('activeUsersList');
      container.innerHTML = "";
      usersList.forEach(user => {
        const div = document.createElement('div');
        div.className = 'user-badge';
        div.innerText = user;
        container.appendChild(div);
      });
    });

    socket.on('connect_error', (error) => {
      console.error("Bağlantı xətası:", error);
    });
  </script>
</body>
</html>
