<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maqalux - Modern Çat</title>
  <link rel="icon" href="logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* Bütün orijinal CSS eynilə saxlanılıb */
    body { margin: 0; font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #090d22 0%, #082962 45%, #0151b1 100%); color: white; min-height: 100vh; display: flex; flex-direction: column; }
    header { display: flex; align-items: center; justify-content: space-between; height: 90px; padding: 0 30px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); position: sticky; top: 0; z-index: 1000; }
    header a.logo img { height: 55px; transition: transform 0.4s ease; }
    header a.logo img:hover { transform: scale(1.1) rotate(-3deg); }
    nav ul { list-style: none; display: flex; gap: 10px; margin: 0; padding: 0; }
    nav ul li a { text-decoration: none; color: white; font-weight: 600; font-size: 16px; padding: 10px 22px; border-radius: 30px; transition: all 0.3s ease; }
    nav ul li a.active { background: linear-gradient(90deg, #ffc107, #ff9800); color: #0a1329; box-shadow: 0 4px 15px rgba(255,152,0,0.3); }
    main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .chat-container { width: 100%; max-width: 1000px; height: 650px; background: rgba(10, 22, 52, 0.5); backdrop-filter: blur(25px); border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); display: flex; flex-direction: column; overflow: hidden; }
    .chat-screen { display: none !important; height: 100%; width: 100%; }
    .chat-screen.active { display: flex !important; flex-direction: column; }
    #loginScreen { justify-content: center; align-items: center; position: relative; }
    .login-card { background: rgba(13, 27, 62, 0.75); backdrop-filter: blur(20px); padding: 50px 40px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 25px 55px rgba(0, 0, 0, 0.6); width: 85%; max-width: 380px; display: flex; flex-direction: column; align-items: center; }
    .login-card h2 { font-size: 1.9em; color: #ffaa00; margin: 0 0 12px 0; font-weight: 700; text-align: center; width: 100%; letter-spacing: 0.5px; }
    .login-card p { color: rgba(255, 255, 255, 0.6); font-size: 14px; margin: 0 0 30px 0; text-align: center; }
    .input-group { display: flex; flex-direction: column; gap: 16px; width: 100%; }
    .custom-input { padding: 15px 25px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.08); color: white; font-size: 15px; outline: none; text-align: left; transition: all 0.3s ease; width: 100%; box-sizing: border-box; }
    .custom-input:focus { border-color: #ffa200; background: rgba(255,255,255,0.15); box-shadow: 0 0 12px rgba(255,162,0,0.3); }
    .custom-input::placeholder { color: rgba(255,255,255,0.4); }
    .password-wrapper { position: relative; width: 100%; display: flex; align-items: center; }
    .password-wrapper .custom-input { padding-right: 55px; }
    .toggle-password { position: absolute; right: 22px; cursor: pointer; font-size: 18px; user-select: none; color: rgba(255, 255, 255, 0.5); transition: 0.2s; z-index: 5; }
    .toggle-password:hover { color: white; transform: scale(1.1); }
    .login-btn { background: linear-gradient(90deg, #ffc107, #ff9800); color: #06163a; border: none; padding: 16px; border-radius: 30px; font-weight: 700; font-size: 15px; cursor: pointer; transition: 0.3s; margin-top: 5px; width: 100%; box-shadow: 0 4px 15px rgba(255,152,0,0.2); }
    .login-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(255,152,0,0.4); }
    .switch-text { color: rgba(255,255,255,0.5); font-size: 13.5px; margin-top: 20px; text-align: center; width: 100%; }
    .switch-text span { color: #ffb700; cursor: pointer; font-weight: 600; text-decoration: underline; margin-left: 5px; }
    .switch-text span:hover { color: white; }
    .chat-header { background: rgba(5, 12, 31, 0.5); padding: 18px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .chat-header h3 { margin: 0; color: white; }
    .logout-btn { background: rgba(220, 53, 69, 0.8); color: white; border: none; padding: 8px 18px; border-radius: 20px; cursor: pointer; font-weight: 600; transition: 0.3s; }
    .logout-btn:hover { background: #dc3545; }
    .chat-body { flex: 1; display: flex; overflow: hidden; }
    .messages-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: rgba(0, 0, 0, 0.15); }
    .messages-area::-webkit-scrollbar { width: 6px; }
    .messages-area::-webkit-scrollbar-thumb { background: rgba(255,162,0,0.3); border-radius: 10px; }
    .sidebar-users { width: 220px; background: rgba(5, 12, 31, 0.3); border-left: 1px solid rgba(255,255,255,0.08); padding: 0; overflow: hidden; display: flex; flex-direction: column; }
    .sidebar-users h4 { margin: 0; color: #ffaa00; border-bottom: 1px solid rgba(255,162,0,0.2); padding: 20px 20px 12px 20px; flex-shrink: 0; background: rgba(5, 12, 31, 0.55); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 2; }
    #activeUsersList { flex: 1; overflow-y: auto; padding: 14px 20px 20px 20px; display: flex; flex-direction: column; gap: 10px; }
    #activeUsersList::-webkit-scrollbar { width: 5px; }
    #activeUsersList::-webkit-scrollbar-thumb { background: rgba(255,162,0,0.3); border-radius: 10px; }
    .user-badge { background: rgba(255,255,255,0.06); padding: 8px 14px; border-radius: 20px; font-size: 14px; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: 0.25s; position: relative; }
    .user-badge:hover { background: rgba(255,255,255,0.13); transform: translateX(-2px); }
    .sidebar-avatar-wrap { position: relative; width: 22px; height: 22px; flex-shrink: 0; }
    .sidebar-avatar { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; display: block; }
    .online-dot { position: absolute; bottom: -1px; right: -1px; width: 8px; height: 8px; border-radius: 50%; background: #555; border: 2px solid rgba(13, 27, 62, 1); }
    .online-dot.is-online { background: #2ecc71; box-shadow: 0 0 6px rgba(46, 204, 113, 0.8); }
    .msg-bubble { max-width: 75%; padding: 13px 18px; border-radius: 20px; font-size: 15px; position: relative; word-wrap: break-word; display: flex; flex-direction: column; }
    .msg-bubble b { font-size: 0.85em; opacity: 0.9; color: #ffc107; }
    .msg-bubble img { max-width: 100%; max-height: 200px; border-radius: 12px; margin-top: 7px; object-fit: cover; }
    .msg-me { background: linear-gradient(135deg, #024397, #00285e); color: white; align-self: flex-end; border-bottom-right-radius: 5px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); }
    .msg-other { background: rgba(255, 255, 255, 0.08); color: white; align-self: flex-start; border-bottom-left-radius: 5px; border: 1px solid rgba(255,255,255,0.05); }
    .msg-meta { display: flex; align-items: center; gap: 4px; align-self: flex-end; margin-top: 4px; font-size: 11px; color: rgba(255,255,255,0.55); user-select: none; }
    .input-bar { padding: 15px 20px; background: rgba(5, 12, 31, 0.5); border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 12px; align-items: center; }
    .input-pill { flex: 1; display: flex; align-items: flex-end; gap: 6px; padding: 6px 10px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.06); transition: border-color 0.2s; }
    .input-pill:focus-within { border-color: #ff9800; }
    .message-input { flex: 1; padding: 6px 4px; border: none; background: transparent; border-radius: 0; color: white; font-size: 15px; outline: none; resize: none; overflow-y: auto; font-family: 'Poppins', sans-serif; line-height: 1.4; max-height: 110px;}
    .message-input::placeholder { color: rgba(255,255,255,0.4); }
    .send-btn { background: linear-gradient(90deg, #ffc107, #ff9800); color: #06163a; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 20px; transition: 0.3s; box-shadow: 0 4px 12px rgba(255,152,0,0.2); flex-shrink: 0; }
    .send-btn:hover { transform: scale(1.1); box-shadow: 0 4px 18px rgba(255,152,0,0.4); }
    footer { text-align: center; padding: 20px; color: #ffaa00; font-weight: 600; font-size: 14px; border-top: 1px solid rgba(255,255,255,0.05); background: rgba(0, 0, 0, 0.2); }
    .avatar-container { position: relative; width: 45px; height: 45px; border-radius: 50%; overflow: hidden; cursor: pointer; border: 2px solid #ffaa00; flex-shrink: 0; }
    .avatar-container img { width: 100%; height: 100%; object-fit: cover; }
    .msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .msg-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(255,170,0,0.4); flex-shrink: 0; }
    
    #toastContainer { position: fixed; top: 100px; right: 25px; z-index: 5000; display: flex; flex-direction: column; gap: 12px; max-width: 340px; }
    .toast { background: rgba(13, 27, 62, 0.92); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.12); border-left: 4px solid #ffaa00; border-radius: 14px; padding: 14px 18px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); color: white; font-size: 14px; opacity: 0; transform: translateX(40px); transition: all 0.35s ease; }
    .toast.show { opacity: 1; transform: translateX(0); }
    .toast.toast-success { border-left-color: #2ecc71; }
    .toast.toast-error { border-left-color: #e74c3c; }
    .google-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; background: rgba(255,255,255,0.95); color: #1f1f1f; border: 1px solid rgba(255,255,255,0.2); padding: 14px; border-radius: 30px; font-weight: 600; font-size: 14.5px; cursor: pointer; transition: 0.3s; margin-top: 14px; }
    .divider-row { display: flex; align-items: center; gap: 12px; width: 100%; margin: 18px 0 0 0; }
    .divider-row .line { flex: 1; height: 1px; background: rgba(255,255,255,0.15); }
    .divider-row span { color: rgba(255,255,255,0.4); font-size: 12.5px; }

    /* Modal Styling */
    .modal-overlay { position: fixed; inset: 0; background: rgba(3, 7, 20, 0.75); backdrop-filter: blur(6px); z-index: 4000; display: none; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
    .modal-overlay.active { display: flex; }
    .modal-box { background: rgba(13, 27, 62, 0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 22px; padding: 35px 30px; width: 100%; max-width: 360px; box-shadow: 0 25px 60px rgba(0,0,0,0.6); display: flex; flex-direction: column; align-items: center; }
    
    @media (max-width: 700px) {
      header { height: auto; flex-direction: column; padding: 10px; gap: 8px; }
      main { padding: 0; } 
      .chat-container { height: auto; flex: 1; min-height: 100%; border-radius: 0; margin: 0; border: none; }
      footer { display: none; } 
      .chat-body { flex-direction: column; }
      .sidebar-users { width: 100%; height: 90px; border-left: none; border-bottom: 1px solid rgba(255,255,255,0.1); order: -1; }
      #activeUsersList { flex-direction: row; gap: 8px; overflow-x: auto; overflow-y: hidden; }
      .input-bar { padding: 10px; }
      .send-btn { width: 38px; height: 38px; }
    }
  </style>
</head>

<body>
  <div id="toastContainer"></div>

  <header>
    <a href="../index.html" class="logo">
      <img src="https://maqalux.github.io/Picsart_25-10-28_10-01-29-931.png" alt="Maqalux loqosu">
    </a>
    <nav>
      <ul>
        <li><a href="../index.html">Ana səhifə</a></li>
        <li><a href="onlinechat.html" class="active">Onlayn çat</a></li>
      </ul> 
    </nav>
  </header>

  <main>
    <div class="chat-container">
      
      <div class="chat-screen active" id="loginScreen">
        <div class="login-card" id="loginFormCard">
          <h2>Maqalux Çat Platforması</h2>
          <p>Söhbətə başlamaq üçün daxil olun</p>
          <div class="input-group">
            <input type="email" id="loginEmailInput" class="custom-input" placeholder="E-poçt ünvanınız">
            <div class="password-wrapper">
              <input type="password" id="loginPasswordInput" class="custom-input" placeholder="Şifrəniz">
              <span class="toggle-password" onclick="togglePasswordVisibility('loginPasswordInput', this)">👁️</span>
            </div>
            <button class="login-btn" onclick="handleLogin()">Söhbətə Qoşul</button>
            <div class="divider-row"><div class="line"></div><span>VƏ YA</span><div class="line"></div></div>
            <button type="button" class="google-btn" onclick="handleGoogleLogin()">
              <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
              Google ilə daxil ol
            </button>
            <p class="switch-text">Hesabınız yoxdur? <span onclick="toggleAuthForms('register')">Qeydiyyatdan keçin</span></p>
          </div>
        </div>

        <div class="login-card" id="registerFormCard" style="display: none;">
          <h2>Yeni Qeydiyyat</h2>
          <p>Platformada yeni hesab yaratmaq üçün doldurun</p>
          <div class="input-group">
            <input type="text" id="registerNicknameInput" class="custom-input" placeholder="İstifadəçi adı">
            <input type="email" id="registerEmailInput" class="custom-input" placeholder="E-poçt ünvanınız">
            <div class="password-wrapper">
              <input type="password" id="registerPasswordInput" class="custom-input" placeholder="Şifrəniz">
              <span class="toggle-password" onclick="togglePasswordVisibility('registerPasswordInput', this)">👁️</span>
            </div>
            <button class="login-btn" onclick="handleRegister()">Qeydiyyatı Tamamla</button>
            <p class="switch-text">Artıq hesabınız var? <span onclick="toggleAuthForms('login')">Daxil olun</span></p>
          </div>
        </div>
      </div>

      <div class="chat-screen" id="mainChatScreen">
        <div class="chat-header">
          <div style="display: flex; align-items: center; gap: 12px;">
            <div class="avatar-container">
              <img id="myAvatarImg" src="https://www.w3schools.com/howto/img_avatar.png" alt="Profil Şəkli">
            </div>
            <h3 id="myDisplayNick">🟢 İstifadəçi</h3>
          </div>
          <button class="logout-btn" onclick="handleLogout()">Çıxış</button>
        </div>
        
        <div class="chat-body">
          <div class="messages-area" id="chatMessagesArea"></div>
          <div class="sidebar-users">
            <h4>Aktiv istifadəçilər</h4>
            <div id="activeUsersList"></div>
          </div>
        </div>

        <div class="input-bar">
          <div class="input-pill">
            <textarea id="messageInputField" class="message-input" placeholder="Mesajınızı bura yazın..." rows="1" onkeydown="handleKeyPress(event)"></textarea>
          </div>
          <button class="send-btn" onclick="triggerMessageSend()">➤</button>
        </div>
      </div>

    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

  <script>
    // ==========================================
    // 1. FIREBASE INITIALIZATION
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyCHH-f2VT4CVMlnnQZDf6e5w3nj2B7Ay78",
      authDomain: "maqalux-chat.firebaseapp.com",
      databaseURL: "https://maqalux-chat-default-rtdb.firebaseio.com",
      projectId: "maqalux-chat",
      storageBucket: "maqalux-chat.firebasestorage.app",
      messagingSenderId: "127120270719",
      appId: "1:127120270719:web:7b036b7e27a06f71dee64a",
      measurementId: "G-GZ800MRHKJ"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let currentUserData = null;

    // ==========================================
    // 2. UI YARDIMÇILARI (TOAST, FORMLAR)
    // ==========================================
    window.showToast = function(message, type = 'info', duration = 4000) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerText = message;
      container.appendChild(toast);
      requestAnimationFrame(() => toast.classList.add('show'));
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 400);
      }, duration);
    };

    window.togglePasswordVisibility = function(inputId, iconElement) {
      const input = document.getElementById(inputId);
      if (input.type === "password") {
        input.type = "text";
        iconElement.innerText = "🙈"; 
      } else {
        input.type = "password";
        iconElement.innerText = "👁️"; 
      }
    };

    window.toggleAuthForms = function(mode) {
      document.getElementById('loginFormCard').style.display = mode === 'register' ? 'none' : 'flex';
      document.getElementById('registerFormCard').style.display = mode === 'register' ? 'flex' : 'none';
    };

    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.innerText = str;
      return div.innerHTML;
    }

    function formatMsgTime(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
    }

    // ==========================================
    // 3. AUTHENTICATION & PRESENCE
    // ==========================================
    auth.onAuthStateChanged((user) => {
      if (user) {
        // İstifadəçi daxil olub
        const userRef = db.ref(`users/${user.uid}`);
        userRef.once('value').then(snap => {
          if(snap.exists()){
            currentUserData = snap.val();
            document.getElementById('myDisplayNick').innerHTML = `🟢 ${currentUserData.nick} (${currentUserData.role || 'user'})`;
            document.getElementById('myAvatarImg').src = currentUserData.avatarUrl || "https://www.w3schools.com/howto/img_avatar.png";
            
            document.getElementById('loginScreen').classList.remove('active');
            document.getElementById('mainChatScreen').classList.add('active');

            // Presence (Onlayn statusu) İdarəetməsi
            const connectedRef = db.ref(".info/connected");
            connectedRef.on("value", (snap) => {
              if (snap.val() === true) {
                userRef.child('online').set(true);
                userRef.child('online').onDisconnect().set(false);
              }
            });

            loadMessages();
            loadActiveUsers();
          }
        });
      } else {
        // İstifadəçi çıxış edib
        currentUserData = null;
        document.getElementById('loginScreen').classList.add('active');
        document.getElementById('mainChatScreen').classList.remove('active');
      }
    });

    window.handleRegister = async function() {
      const nick = document.getElementById('registerNicknameInput').value.trim();
      const email = document.getElementById('registerEmailInput').value.trim();
      const pass = document.getElementById('registerPasswordInput').value.trim();
      
      if(!nick || !email || !pass) return showToast("Bütün xanaları doldurun.", "error");

      try {
        const userCred = await auth.createUserWithEmailAndPassword(email, pass);
        // Yeni istifadəçini bazaya qeyd edirik
        await db.ref(`users/${userCred.user.uid}`).set({
          nick: nick,
          email: email,
          role: 'user',
          avatarUrl: 'https://www.w3schools.com/howto/img_avatar.png',
          online: true,
          isBanned: false
        });
        showToast("Qeydiyyat uğurludur!", "success");
      } catch (err) {
        showToast(err.message, "error");
      }
    };

    window.handleLogin = async function() {
      const email = document.getElementById('loginEmailInput').value.trim();
      const pass = document.getElementById('loginPasswordInput').value.trim();
      if(!email || !pass) return showToast("Email və şifrəni daxil edin.", "error");

      try {
        await auth.signInWithEmailAndPassword(email, pass);
        showToast("Uğurla daxil oldunuz!", "success");
      } catch (err) {
        showToast("Xəta: " + err.message, "error");
      }
    };

    window.handleGoogleLogin = async function() {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        const result = await auth.signInWithPopup(provider);
        const user = result.user;
        
        // Bazada istifadəçi varmı yoxlayırıq
        const userRef = db.ref(`users/${user.uid}`);
        const snap = await userRef.once('value');
        
        if (!snap.exists()) {
          await userRef.set({
            nick: user.displayName || 'Google İstifadəçisi',
            email: user.email,
            role: 'user',
            avatarUrl: user.photoURL || 'https://www.w3schools.com/howto/img_avatar.png',
            online: true,
            isBanned: false
          });
        } else {
          await userRef.update({ online: true });
        }
        showToast("Google ilə daxil oldunuz!", "success");
      } catch (err) {
        showToast("Google Xətası: " + err.message, "error");
      }
    };

    window.handleLogout = function() {
      if(auth.currentUser) {
        db.ref(`users/${auth.currentUser.uid}/online`).set(false).then(() => {
          auth.signOut();
        });
      }
    };

    // ==========================================
    // 4. MESAJLARIN YAZILMASI VƏ OXUNMASI
    // ==========================================
    window.handleKeyPress = (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        triggerMessageSend();
      }
    };

    window.triggerMessageSend = async () => {
      const input = document.getElementById('messageInputField');
      const text = input.value.trim();
      if(!text || !currentUserData) return;

      const newMsgRef = db.ref('messages').push();
      await newMsgRef.set({
        senderId: auth.currentUser.uid,
        senderNick: currentUserData.nick,
        senderAvatar: currentUserData.avatarUrl,
        text: text,
        timestamp: firebase.database.ServerValue.TIMESTAMP
      });

      input.value = "";
    };

    function loadMessages() {
      const msgArea = document.getElementById('chatMessagesArea');
      msgArea.innerHTML = ''; 

      // Yeni mesajlar gəldikcə ekrana əlavə edirik
      db.ref('messages').limitToLast(100).on('child_added', (snapshot) => {
        const msg = snapshot.val();
        appendMessage(snapshot.key, msg);
      });
    }

    function appendMessage(msgKey, msg) {
      const isMe = msg.senderId === auth.currentUser.uid;
      const div = document.createElement('div');
      div.className = 'msg-bubble ' + (isMe ? 'msg-me' : 'msg-other');
      
      div.innerHTML = `
        <div class="msg-header">
          <img src="${msg.senderAvatar || 'https://www.w3schools.com/howto/img_avatar.png'}" class="msg-avatar">
          <b>${escapeHtml(msg.senderNick)}</b>
        </div>
        <div>${escapeHtml(msg.text)}</div>
        <div class="msg-meta">${formatMsgTime(msg.timestamp)}</div>
      `;
      
      const area = document.getElementById('chatMessagesArea');
      area.appendChild(div);
      area.scrollTop = area.scrollHeight;
    }

    // ==========================================
    // 5. AKTİV İSTİFADƏÇİLƏRİN GÖSTƏRİLMƏSİ
    // ==========================================
    function loadActiveUsers() {
      db.ref('users').on('value', (snapshot) => {
        const container = document.getElementById('activeUsersList');
        container.innerHTML = "";
        
        snapshot.forEach((childSnap) => {
          const user = childSnap.val();
          if (user.online && !user.isBanned) {
            const div = document.createElement('div');
            div.className = 'user-badge';
            const isMe = childSnap.key === auth.currentUser.uid;
            
            div.innerHTML = `
              <div class="sidebar-avatar-wrap">
                <img src="${user.avatarUrl}" class="sidebar-avatar">
                <span class="online-dot is-online"></span>
              </div>
              <span>${escapeHtml(user.nick)}${isMe ? ' (siz)' : ''}</span>
            `;
            container.appendChild(div);
          }
        });
      });
    }
  </script>
</body>
